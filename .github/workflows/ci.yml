name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verifiedsignal
          POSTGRES_PASSWORD: verifiedsignal
          POSTGRES_DB: verifiedsignal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U verifiedsignal -d verifiedsignal"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # Use 127.0.0.1: on GHA, localhost can prefer IPv6 (::1) while the mapped port is IPv4-only.
      DATABASE_URL: postgresql://verifiedsignal:verifiedsignal@127.0.0.1:5432/verifiedsignal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install

      - name: Wait for Postgres and apply migrations
        run: |
          set -euo pipefail
          export PGHOST=127.0.0.1
          export PGPORT=5432
          export PGUSER=verifiedsignal
          export PGDATABASE=verifiedsignal
          export PGPASSWORD=verifiedsignal
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do sleep 1; done
          attempt=0
          until psql -c "SELECT 1" >/dev/null; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 30 ]; then
              echo "Postgres did not accept authenticated connections in time"
              exit 1
            fi
            sleep 1
          done
          psql -v ON_ERROR_STOP=1 -f db/migrations/001_initial_schema.up.sql
          psql -v ON_ERROR_STOP=1 -f db/migrations/002_intake_document_fields.up.sql
          psql -v ON_ERROR_STOP=1 -f db/migrations/003_document_body_text.up.sql
          psql -v ON_ERROR_STOP=1 -f db/migrations/004_document_extract_artifact.up.sql
          psql -v ON_ERROR_STOP=1 -f db/migrations/005_documents_user_metadata.up.sql
          psql -c "SELECT 1"

      - name: Ruff
        run: pdm run python -m ruff check src tests app worker

      - name: Tests
        run: pdm run python -m pytest -v --tb=short
