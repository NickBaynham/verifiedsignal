name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verifiedsignal
          POSTGRES_PASSWORD: verifiedsignal
          POSTGRES_DB: verifiedsignal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U verifiedsignal -d verifiedsignal"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://verifiedsignal:verifiedsignal@localhost:5432/verifiedsignal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install

      - name: Wait for Postgres and apply migrations
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U verifiedsignal; do sleep 1; done
          PGPASSWORD=verifiedsignal psql -h localhost -U verifiedsignal -d verifiedsignal -v ON_ERROR_STOP=1 \
            -f db/migrations/001_initial_schema.up.sql
          PGPASSWORD=verifiedsignal psql -h localhost -U verifiedsignal -d verifiedsignal -v ON_ERROR_STOP=1 \
            -f db/migrations/002_intake_document_fields.up.sql

      - name: Ruff
        run: pdm run ruff check src tests app worker

      - name: Tests
        run: pdm run pytest -v --tb=short
