# Local development stack: PostgreSQL, Redis, MinIO (S3-compatible), OpenSearch + Dashboards, and the app.
# `docker compose up` starts all services except `test` (profile: test).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verifiedsignal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifiedsignal}
      POSTGRES_DB: ${POSTGRES_DB:-verifiedsignal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-verifiedsignal} -d ${POSTGRES_DB:-verifiedsignal}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      - discovery.type=single-node
      # Local dev only: turn off the security plugin (avoids OPENSEARCH_INITIAL_ADMIN_PASSWORD flow).
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"

  app:
    build: .
    image: verifiedsignal:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      VERIFIEDSIGNAL_CONFIG_DIR: /app/config
      DATABASE_URL: ${DATABASE_URL:-postgresql://verifiedsignal:verifiedsignal@postgres:5432/verifiedsignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VERIFIEDSIGNAL_ARQ_QUEUE: ${VERIFIEDSIGNAL_ARQ_QUEUE:-verifiedsignal:jobs}
      USE_FAKE_QUEUE: ${USE_FAKE_QUEUE:-false}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-verifiedsignal}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "api-prod"]

  worker:
    build: .
    image: verifiedsignal:local
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VERIFIEDSIGNAL_ARQ_QUEUE: ${VERIFIEDSIGNAL_ARQ_QUEUE:-verifiedsignal:jobs}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
    command: ["pdm", "run", "worker"]

  test:
    build: .
    image: verifiedsignal:local
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      VERIFIEDSIGNAL_CONFIG_DIR: /app/config
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "pytest"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
